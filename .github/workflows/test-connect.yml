name: Network Diagnostics

on:
  workflow_dispatch:

env:
  HOST: templates.cloud.ai4eosc.eu
  URL: https://templates.cloud.ai4eosc.eu/

jobs:
  diagnostics:
    runs-on: ubuntu-latest

    steps:
      - name: Install networking tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dnsutils traceroute

      - name: Show configuration
        run: |
          echo "HOST=${HOST}"
          echo "URL=${URL}"

      - name: Show proxy environment
        run: |
          env | grep -i proxy || true

      - name: Show versions
        run: |
          node --version
          npm --version
          curl --version

      - name: Test DNS from Node
        run: |
          node -e '
            require("dns").lookup(process.env.HOST, { all: true }, (err, addr) => {
              console.log(err || addr);
            });
          '
      - name: OpenSSL connection
        run: |
          openssl s_client \
            -connect templates.cloud.ai4eosc.eu:443 \
            -servername templates.cloud.ai4eosc.eu
    
      - name: Debug Node HTTPS
        run: |
          node -e '
            const https = require("https");
      
            console.log("Starting");
      
            const req = https.request(process.env.URL, res => {
              console.log("Response:", res.statusCode);
              res.on("data", () => {});
              res.on("end", () => console.log("End"));
            });
      
            req.on("socket", socket => {
              console.log("Socket created");
      
              socket.on("lookup", (err, address, family) => {
                console.log("lookup", err, address, family);
              });
      
              socket.on("connect", () => {
                console.log("TCP connected");
              });
      
              socket.on("secureConnect", () => {
                console.log("TLS connected");
              });
      
              socket.on("timeout", () => {
                console.log("Socket timeout");
              });
      
              socket.on("error", err => {
                console.log("Socket error", err);
              });
            });
      
            req.on("error", err => {
              console.error("Request error", err);
            });
      
            req.setTimeout(10000, () => {
              console.log("Request timeout");
              req.destroy();
            });
      
            req.end();
          '

      - name: Test https module
        run: |
          node -e '
            const https = require("https");

            const req = https.get(process.env.URL, res => {
              console.log("status", res.statusCode);
              res.resume();
            });
            req.on("error", console.error);
          '

      - name: Node IPv4 first
        run: |
          export NODE_OPTIONS=--dns-result-order=ipv4first
          node -e '
            fetch(process.env.URL)
              .then(r => console.log(r.status))
              .catch(console.error);
          '

      - name: Test using Node.js fetch
        run: |
          node -e '
            const start = Date.now();
            fetch(process.env.URL)
              .then(async r => {
                console.log("Status:", r.status);
                console.log("Elapsed:", Date.now() - start, "ms");
                console.log("Length:", (await r.text()).length);
              })
              .catch(err => {
                console.error(err);
                process.exit(1);
              });
          '
        env:
          URL: ${{ env.URL }}

      - name: DNS lookup
        run: |
          dig "${HOST}"
          dig "${HOST}" A
          dig "${HOST}" AAAA

      - name: Test with curl
        run: |
          curl \
            --connect-timeout 10 \
            --max-time 30 \
            --verbose \
            "${URL}"

      - name: Test IPv4 explicitly
        run: |
          curl \
            -4 \
            --connect-timeout 10 \
            --max-time 30 \
            --verbose \
            "${URL}"

      - name: Show TLS certificate
        run: |
          openssl s_client \
            -connect "${HOST}:443" \
            -servername "${HOST}" \
            </dev/null

#      - name: Trace route
#        run: |
#          traceroute "${HOST}" || true
